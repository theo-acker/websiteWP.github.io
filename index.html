<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accueil — MonSite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">Mon<span>Site</span></a>
    <div class="navbar__actions">
      <a href="start.html"   class="btn btn--start">Start</a>
      <a href="apropos.html" class="btn btn--ghost">À propos</a>
    </div>
  </nav>

  <!-- ── Contenu principal ── -->
  <main class="page">
    <section class="hero">
      <p class="hero__eyebrow">Bienvenue</p>
      <h1 class="hero__title">Votre projet<br>commence <em>ici</em></h1>
      <p class="hero__subtitle">
        Un point de départ propre, structuré et prêt à être personnalisé.
        Modifiez ces fichiers HTML et CSS pour bâtir votre site.
      </p>
      <div class="hero__cta">
        <a href="start.html" class="btn btn--start">Démarrer →</a>
      </div>
    </section>
  </main>

  <!-- ── Pied de page ── -->
  <footer class="footer">
    <p>&copy; <span id="year"></span> MonSite — Tous droits réservés</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
